# Alacritty Configuration
# Based on popular community configs with Tokyo Night theme

[general]
import = []

# ── Terminal ──────────────────────────────────────────────────────────────────
[terminal]
osc52 = "CopyPaste"

# ── Shell ─────────────────────────────────────────────────────────────────────
[terminal.shell]
program = "powershell.exe"
args = ["-NoLogo", "-WorkingDirectory", "C:\\Users\\huicliu\\claude_test"]

# ── Environment ───────────────────────────────────────────────────────────────
[env]
TERM = "xterm-256color"

# ── Window ────────────────────────────────────────────────────────────────────
[window]
padding = { x = 0, y = 0 }
decorations = "full"
decorations_theme_variant = "Dark"
opacity = 0.95
blur = true
startup_mode = "Maximized"
dynamic_title = true

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history = 10000
multiplier = 10

# ── Font ──────────────────────────────────────────────────────────────────────
# Uses JetBrainsMono Nerd Font — install from https://www.nerdfonts.com/font-downloads
# Popular alternatives: FiraCode Nerd Font, CaskaydiaCove Nerd Font, Hack Nerd Font
[font]
size = 15.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"
# family = "MesloLGS NF"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"
# family = "MesloLGS NF"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"
# family = "MesloLGS NF"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"
# family = "MesloLGS NF"

