# ── Ubuntu theme ──────────────────────────────────────────────────────────────
[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = '#300a24'
foreground = '#eeeeec'

[colors.cursor]
text   = '#bbbbbb'
cursor = '#b4d5ff'

[colors.normal]
black   = '#2e3436'
red     = '#cc0000'
green   = '#4e9a06'
yellow  = '#c4a000'
blue    = '#3465a4'
magenta = '#75507b'
cyan    = '#06989a'
white   = '#d3d7cf'

[colors.bright]
black   = '#555753'
red     = '#ef2929'
green   = '#8ae234'
yellow  = '#fce94f'
blue    = '#729fcf'
magenta = '#ad7fa8'
cyan    = '#34e2e2'
white   = '#eeeeec'

# ── Cursor ────────────────────────────────────────────────────────────────────
[cursor]
style         = { shape = "Block", blinking = "On" }
blink_timeout = 5
unfocused_hollow = true

# ── Bell ──────────────────────────────────────────────────────────────────────
[bell]
animation = "EaseOutExpo"
duration  = 0

# ── Selection ─────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard = true

# ── Mouse ─────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Keyboard shortcuts ────────────────────────────────────────────────────────
[[keyboard.bindings]]
key   = "Return"
mods  = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key   = "C"
mods  = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key   = "V"
mods  = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key   = "Plus"
mods  = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key   = "Minus"
mods  = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key   = "Key0"
mods  = "Control"
action = "ResetFontSize"
