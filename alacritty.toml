# ── Cursor ────────────────────────────────────────────────────────────────────
[cursor]
style         = { shape = "Block", blinking = "On" }
blink_timeout = 5
unfocused_hollow = true

# ── Bell ──────────────────────────────────────────────────────────────────────
[bell]
animation = "EaseOutExpo"
duration  = 0

# ── Selection ─────────────────────────────────────────────────────────────────
[selection]
save_to_clipboard = true

# ── Mouse ─────────────────────────────────────────────────────────────────────
[mouse]
hide_when_typing = true

# ── Keyboard shortcuts ────────────────────────────────────────────────────────
[[keyboard.bindings]]
key   = "Return"
mods  = "Control|Shift"
action = "SpawnNewInstance"

[[keyboard.bindings]]
key   = "C"
mods  = "Control|Shift"
action = "Copy"

[[keyboard.bindings]]
key   = "V"
mods  = "Control|Shift"
action = "Paste"

[[keyboard.bindings]]
key   = "Plus"
mods  = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key   = "Minus"
mods  = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key   = "Key0"
mods  = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

[[keyboard.bindings]]
key   = "Up"
mods  = "Control|Shift"
action = "ScrollLineUp"

[[keyboard.bindings]]
key   = "Down"
mods  = "Control|Shift"
action = "ScrollLineDown"

[[keyboard.bindings]]
key   = "PageUp"
mods  = "Shift"
action = "ScrollPageUp"

[[keyboard.bindings]]
key   = "PageDown"
mods  = "Shift"
action = "ScrollPageDown"
