# Alacritty Configuration
# Based on popular community configs with Tokyo Night theme

[general]
import = []

# ── Window ────────────────────────────────────────────────────────────────────
[window]
padding = { x = 10, y = 10 }
decorations = "full"
opacity = 0.95
blur = true
startup_mode = "Windowed"
dynamic_title = true

# ── Scrolling ─────────────────────────────────────────────────────────────────
[scrolling]
history = 10000
multiplier = 3

# ── Font ──────────────────────────────────────────────────────────────────────
# Uses JetBrainsMono Nerd Font — install from https://www.nerdfonts.com/font-downloads
# Popular alternatives: FiraCode Nerd Font, CaskaydiaCove Nerd Font, Hack Nerd Font
[font]
size = 14.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style  = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style  = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style  = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style  = "Bold Italic"

# Fallback if Nerd Font is not installed — swap back to Consolas
# [font.normal]
# family = "Consolas"
# style  = "Regular"

